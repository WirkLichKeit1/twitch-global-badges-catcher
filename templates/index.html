<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Twitch Global Badges</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roobert:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="noise"></div>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
        </svg>
        <span class="logo-text">Badge<em>Vault</em></span>
      </div>
      <div class="header-meta">
        <span class="tag">Global Badges</span>
        <span id="badge-count" class="count-badge">–</span>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <h1 class="hero-title">Global<br><span>Badges</span></h1>
      <p class="hero-sub">Todos os badges globais disponíveis na plataforma Twitch.</p>
    </section>

    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" class="search-input" placeholder="Filtrar badges..." autocomplete="off"/>
      </div>
      <button class="btn-reload" id="reload-btn" title="Recarregar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
    </div>

    <div id="state-loading" class="state-box">
      <div class="spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
      <p>Carregando badges…</p>
    </div>

    <div id="state-error" class="state-box hidden">
      <div class="error-icon">✕</div>
      <p id="error-msg">Erro ao carregar badges.</p>
      <button class="btn-retry" id="retry-btn">Tentar novamente</button>
    </div>

    <div id="state-empty" class="state-box hidden">
      <p>Nenhum badge encontrado.</p>
    </div>

    <div id="badges-grid" class="badges-grid hidden"></div>
  </main>

  <footer class="footer">
    <span>Powered by <strong>Twitch Helix API</strong></span>
    <span class="footer-dot">·</span>
    <span id="footer-time">–</span>
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
